name: iOS Unsigned Build for Sideloadly

# GitHubの画面上から手動でビルドのボタンを押せるようにする設定
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS app (署名なしでビルド)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA (Sideloadly用にIPA形式に圧縮)
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r SoundGuard.ipa Payload

      - name: Upload IPA Artifact (完成品をダウンロード可能にする)
        uses: actions/upload-artifact@v4
        with:
          name: SoundGuard-iOS
          path: SoundGuard.ipa